<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .thankyou-wrapper {
      background: #ffffff;
      max-width: 420px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .thankyou-logo {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .thankyou-wrapper h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }

    .thankyou-wrapper p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 25px;
    }

    .thankyou-note {
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="thankyou-wrapper">
    <div class="thankyou-logo">ThinkVoice</div>

    <h1>Thank you!</h1>

    <p>
      Your request has been successfully submitted.<br>
      One of our specialists will contact you shortly.
    </p>

    <div class="thankyou-note">
      Please keep your phone available.
    </div>
  </div>

</body>
</html>
